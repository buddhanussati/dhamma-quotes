name: Generate RSS Feed

on:
  schedule:
    # This cron schedule runs at minute 0 past every 6th hour.
    - cron: '0 */6 * * *'
  workflow_dispatch: # This allows you to trigger the workflow manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required so the bot can push the new rss.xml file to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generation script
        run: node generate-rss.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rss.xml
          # The || exit 0 ensures the workflow doesn't fail if the quote randomly happens to be the same one
          git commit -m "chore: update RSS feed with new random quote" || exit 0
          git push