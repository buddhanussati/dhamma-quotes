name: Generate Thanissaro Bhikkhu RSS Feed

on:
  schedule:
    # This cron schedule runs at minute 0 past every 6th hour.
    - cron: '0 */6 * * *'
  workflow_dispatch: # This allows you to trigger the workflow manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required so the bot can push the new rss.xml file to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generation script
        run: node generate-rss-thanissaro.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # CHANGE THIS LINE: Add history.json to the list
          git add rss-thanissaro.xml history-thanissaro.json 
          git commit -m "chore: update RSS feed and quote history" || exit 0

          git push



