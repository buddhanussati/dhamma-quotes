name: Generate Ajahn Chah RSS Feed

on:
  schedule:
    - cron: '32 0 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generation script
        run: node generate-rss-ajahnchah.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ajahnchah.xml history-ajahnchah.json cycle-state-ajahnchah.json
          git commit -m "chore: update Ajahn Chah RSS feed and quote history" || exit 0

          git push





